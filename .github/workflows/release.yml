name: Release on merge

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - 'CHANGELOG.md'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' extension/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build extension zip
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          # Zip contents directly — no version in the folder name so users
          # can unzip over the same 'extension/' folder and just refresh.
          cd extension
          zip -r ../HitFactorCharts.zip .

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("CHANGELOG.md")
          if not path.exists():
              raise SystemExit(0)

          text = path.read_text()
          pattern = re.compile(rf"^## v{re.escape(version)}[^\n]*\n(?P<body>.*?)(?=^## v|\Z)", re.M | re.S)
          match = pattern.search(text)
          if match:
              print(match.group("body").strip())
          PY
          )

          if [ -z "$NOTES" ]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              NOTES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- chore:" || true)
            else
              NOTES=$(git log --pretty=format:"- %s" --no-merges -10 | grep -v "^- chore:" || true)
            fi
          fi

          gh release create "${{ steps.version.outputs.tag }}" \
            "HitFactorCharts.zip" \
            --title "Hit Factor Charts v${{ steps.version.outputs.version }}" \
            --notes "${NOTES:-No notable changes.}"
